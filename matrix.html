        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier Prime', monospace;
            min-height: 100vh;
            position: relative;
            -webkit-font-smoothing: none;
            font-smooth: never;
            filter: contrast(1.05) saturate(1.3);
        }

        .container {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
        }

        /* CRT scanlines */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0.18) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 2px;
            mix-blend-mode: multiply;
            z-index: 2;
            animation: scanlines 6s linear infinite;
        }

        /* Vignette and subtle glow */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(0, 255, 65, 0.05) 0%, rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 3;
        }

        .matrix-text {
            color: #00ff41;
            font-size: 1rem;
            font-weight: normal;
            letter-spacing: 0.03em;
            line-height: 1;
            text-shadow: 0 0 1px #00ff41,
                         0 0 3px #00ff41,
                         0 0 8px rgba(0, 255, 65, 1),
                         0 0 18px rgba(0, 255, 65, 0.9),
                         0 0 38px rgba(0, 255, 65, 0.75);
            animation: text-flicker 8s infinite steps(1, end);
            padding-top: 1rem;
            padding-left: 1rem;
        }

        .terminal-cursor {
            display: inline-block;
            background: #00ff41;
            width: 0.6ch;
            height: 1em;
            vertical-align: -0.12em;
            box-shadow: 0 0 6px #00ff41, 0 0 24px rgba(0, 255, 65, 0.95), 0 0 40px rgba(0, 255, 65, 0.6);
            animation: blink 1s steps(1, end) infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        @keyframes scanlines {
            from { background-position: 0 0; }
            to { background-position: 0 2px; }
        }

        @keyframes text-flicker {
            0%, 100% { opacity: 1; filter: none; }
            48% { opacity: 0.98; }
            50% { opacity: 0.96; }
            52% { opacity: 1; }
            54% { opacity: 0.97; }
            70% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="matrix-text">
            Wake up, Neo...
            <span class="terminal-cursor"></span>
        </div>
    </div>
</body>
</html>
